<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo1.jpg" />
    <!-- Viewport fundamental: initial-scale=1 evita zoom en inputs en iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Krypton | Descubre tu gran debilidad</title>
    
    <!-- Meta tags SEO -->
    <meta name="description" content="Krypton Tienda. Encuentra diseños fascinantes en camisetas, tazas y más. Anime, superhéroes, clásicos y videojuegos. Descubre tu gran debilidad." />
    <meta property="og:title" content="Krypton | Descubre tu gran debilidad" />
    <meta property="og:description" content="Entra y deléitate con la variedad de diseños sublimados de tus personajes favoritos." />
    <meta property="og:image" content="https://krypton-tienda.web.app/hero-definitivo.jpg" />
    <meta property="og:image:secure_url" content="https://krypton-tienda.web.app/hero-definitivo.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Krypton Tienda Hero Image" />
    <meta property="og:url" content="https://krypton-tienda.web.app/" />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Krypton | Descubre tu gran debilidad" />
    <meta name="twitter:description" content="Entra y deléitate con la variedad de diseños sublimados de tus personajes favoritos." />
    <meta name="twitter:image" content="https://krypton-tienda.web.app/hero-definitivo.jpg" />

    <!-- PWA Enablers -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#39ff14" />
    <!-- Apple / iOS: habilita modo standalone y statusbar del color correcto -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Krypton" />
    <link rel="apple-touch-icon" href="/logo1.jpg" />
    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Google Fonts: preconnect primero, luego la hoja de estilos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- display=swap garantiza que el texto es visible mientras carga la fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <!-- Fallback para navegadores que no ejecutan onload en link -->
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet"></noscript>
    
    <!-- Theme Flash Preventer -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('krypton-theme');
          if (theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.body.style.backgroundColor = '#0a0a0a';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="krypton-body">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW PWA registrado correctamente: ', registration.scope);
          }).catch(err => {
            console.log('Fallo el registro del SW: ', err);
          });
        });
      }
    </script>
  </body>
</html>
